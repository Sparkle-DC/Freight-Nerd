<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <base href="/Freight-Nerd/">
 <meta name="description" content="Free Pallet Calculator - See how many boxes fit on a pallet. Instant stacking calculator with standard pallet sizes.">
 <title>Pallet Calculator | FreightNerd</title>
 <script src="https://cdn.tailwindcss.com"></script>
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
 <style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap'); body { font-family: 'Inter', system-ui, sans-serif; } .calculator-card { box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.15); }</style>
</head>
<body class="bg-gray-50">
<div class="max-w-6xl mx-auto px-4 py-8">
 <div class="flex items-center justify-between mb-8">
  <a href="/Freight-Nerd/"><div class="text-3xl font-bold text-emerald-600">FreightNerd</div></a>
  <a href="/Freight-Nerd/" class="text-emerald-600 hover:text-emerald-700 font-medium flex items-center gap-2"><i class="fas fa-th-large"></i> All Tools</a>
 </div>
 <div class="grid lg:grid-cols-2 gap-8">
  <div class="calculator-card bg-white rounded-3xl p-8 border border-gray-100">
   <div class="flex items-center gap-3 mb-6"><i class="fas fa-layer-group text-4xl text-emerald-600"></i><div><h1 class="text-3xl font-semibold text-gray-900">Pallet Calculator</h1><p class="text-gray-600">Boxes per Pallet & Stacking</p></div></div>
   <div class="space-y-8">
    <div><h3 class="font-medium text-gray-700 mb-4">Pallet Size</h3>
     <select id="palletSize" class="w-full px-4 py-3 border border-gray-200 rounded-2xl focus:outline-none focus:border-emerald-500 text-lg mb-3">
      <option value="48x40">48" x 40" (Standard GMA)</option>
      <option value="48x48">48" x 48"</option>
      <option value="42x42">42" x 42"</option>
      <option value="custom">Custom</option>
     </select>
     <div class="grid grid-cols-2 gap-4" id="customPallet" class="hidden">
      <div><label class="block text-sm font-medium text-gray-600 mb-1">Pallet Length</label><input id="palletLength" type="number" value="48" class="w-full px-4 py-3 border border-gray-200 rounded-2xl focus:outline-none focus:border-emerald-500 text-lg"></div>
      <div><label class="block text-sm font-medium text-gray-600 mb-1">Pallet Width</label><input id="palletWidth" type="number" value="40" class="w-full px-4 py-3 border border-gray-200 rounded-2xl focus:outline-none focus:border-emerald-500 text-lg"></div>
     </div>
    </div>
    <div><h3 class="font-medium text-gray-700 mb-4">Box Dimensions (inches)</h3>
     <div class="grid grid-cols-3 gap-4">
      <div><label class="block text-sm font-medium text-gray-600 mb-1">Length</label><input id="boxLength" type="number" value="16" class="w-full px-4 py-3 border border-gray-200 rounded-2xl focus:outline-none focus:border-emerald-500 text-lg"></div>
      <div><label class="block text-sm font-medium text-gray-600 mb-1">Width</label><input id="boxWidth" type="number" value="12" class="w-full px-4 py-3 border border-gray-200 rounded-2xl focus:outline-none focus:border-emerald-500 text-lg"></div>
      <div><label class="block text-sm font-medium text-gray-600 mb-1">Height</label><input id="boxHeight" type="number" value="10" class="w-full px-4 py-3 border border-gray-200 rounded-2xl focus:outline-none focus:border-emerald-500 text-lg"></div>
     </div>
    </div>
    <div><label class="block text-sm font-medium text-gray-600 mb-1">Max Pallet Height (inches)</label><input id="maxHeight" type="number" value="48" class="w-full px-4 py-3 border border-gray-200 rounded-2xl focus:outline-none focus:border-emerald-500 text-lg"></div>
    <button onclick="calculatePallet()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-5 rounded-3xl text-xl transition-all flex items-center justify-center gap-3"><i class="fas fa-calculator"></i> Calculate</button>
   </div>
  </div>
  <div id="results" class="hidden lg:block calculator-card bg-white rounded-3xl p-8 border border-gray-100">
   <h2 class="text-2xl font-semibold mb-6">Pallet Results</h2>
   <div id="resultContent" class="space-y-6"></div>
  </div>
 </div>
 <div id="mobileResults" class="lg:hidden mt-8"></div>
</div>
<script>
document.getElementById('palletSize').addEventListener('change',function(){document.getElementById('customPallet').style.display=this.value==='custom'?'grid':'none';calculatePallet()});
function calculatePallet(){
 const ps=document.getElementById('palletSize').value;
 let pL,pW;
 if(ps==='custom'){pL=parseFloat(document.getElementById('palletLength').value)||48;pW=parseFloat(document.getElementById('palletWidth').value)||40}
 else{[pL,pW]=ps.split('x').map(Number)}
 const bL=parseFloat(document.getElementById('boxLength').value)||0,bW=parseFloat(document.getElementById('boxWidth').value)||0,bH=parseFloat(document.getElementById('boxHeight').value)||0,mH=parseFloat(document.getElementById('maxHeight').value)||48;
 const fitL=Math.floor(pL/bL),fitW=Math.floor(pW/bW),fitH=bH>0?Math.floor(mH/bH):0;
 const perLayer=fitL*fitW,total=perLayer*fitH;
 const html=`<div class="grid grid-cols-2 gap-4"><div class="bg-emerald-50 rounded-2xl p-6 text-center"><p class="text-sm text-emerald-700 font-medium">BOXES PER LAYER</p><p class="text-5xl font-semibold text-emerald-600">${perLayer}</p><p class="text-sm text-gray-500">${fitL} × ${fitW}</p></div><div class="bg-amber-50 rounded-2xl p-6 text-center"><p class="text-sm text-amber-700 font-medium">TOTAL BOXES</p><p class="text-5xl font-semibold text-amber-600">${total}</p><p class="text-sm text-gray-500">${fitH} layers</p></div></div><div class="mt-6 bg-white border border-gray-200 rounded-3xl p-6"><div class="text-sm space-y-2"><div class="flex justify-between"><span>Pallet Size</span><span class="font-medium">${pL}" × ${pW}"</span></div><div class="flex justify-between"><span>Max Height</span><span class="font-medium">${mH}"</span></div></div></div>`;
 document.getElementById('resultContent').innerHTML=html;document.getElementById('results').classList.remove('hidden');
 document.getElementById('mobileResults').innerHTML=`<div class="calculator-card bg-white rounded-3xl p-8 border border-gray-100">${html}</div>`;
}
document.querySelectorAll('input').forEach(el=>el.addEventListener('input',calculatePallet));
window.onload=calculatePallet;
</script>
</body>
</html>
