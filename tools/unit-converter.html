<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <base href="/Freight-Nerd/">
 <meta name="description" content="Free Unit Converter for freight - Convert inches to cm, lbs to kg, CBM to CFT and more. Essential shipping unit conversions.">
 <title>Unit Converter | FreightNerd</title>
 <script src="https://cdn.tailwindcss.com"></script>
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
 <style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap'); body { font-family: 'Inter', system-ui, sans-serif; } .calculator-card { box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.15); }</style>
</head>
<body class="bg-gray-50">
<div class="max-w-6xl mx-auto px-4 py-8">
 <div class="flex items-center justify-between mb-8">
  <a href="/Freight-Nerd/"><div class="text-3xl font-bold text-emerald-600">FreightNerd</div></a>
  <a href="/Freight-Nerd/" class="text-emerald-600 hover:text-emerald-700 font-medium flex items-center gap-2"><i class="fas fa-th-large"></i> All Tools</a>
 </div>
 <div class="calculator-card bg-white rounded-3xl p-8 border border-gray-100">
  <div class="flex items-center gap-3 mb-6"><i class="fas fa-exchange-alt text-4xl text-emerald-600"></i><div><h1 class="text-3xl font-semibold text-gray-900">Unit Converter</h1><p class="text-gray-600">Shipping unit conversions made simple</p></div></div>
  <div class="grid lg:grid-cols-3 gap-6">
   <div class="bg-gray-50 rounded-3xl p-6">
    <h3 class="font-medium mb-4">Length</h3>
    <div><label class="text-sm block mb-1">Inches</label><input id="inches" type="number" value="48" class="w-full px-4 py-3 border border-gray-200 rounded-2xl focus:outline-none focus:border-emerald-500 text-lg"></div>
    <div class="mt-3"><label class="text-sm block mb-1">Centimeters</label><input id="cm" type="number" value="121.92" class="w-full px-4 py-3 border border-gray-200 rounded-2xl focus:outline-none focus:border-emerald-500 text-lg"></div>
   </div>
   <div class="bg-gray-50 rounded-3xl p-6">
    <h3 class="font-medium mb-4">Weight</h3>
    <div><label class="text-sm block mb-1">Pounds (lbs)</label><input id="lbs" type="number" value="100" class="w-full px-4 py-3 border border-gray-200 rounded-2xl focus:outline-none focus:border-emerald-500 text-lg"></div>
    <div class="mt-3"><label class="text-sm block mb-1">Kilograms (kg)</label><input id="kg" type="number" value="45.36" class="w-full px-4 py-3 border border-gray-200 rounded-2xl focus:outline-none focus:border-emerald-500 text-lg"></div>
   </div>
   <div class="bg-gray-50 rounded-3xl p-6">
    <h3 class="font-medium mb-4">Volume</h3>
    <div><label class="text-sm block mb-1">Cubic Meters (CBM)</label><input id="cbm" type="number" value="1" class="w-full px-4 py-3 border border-gray-200 rounded-2xl focus:outline-none focus:border-emerald-500 text-lg"></div>
    <div class="mt-3"><label class="text-sm block mb-1">Cubic Feet (CFT)</label><input id="cft" type="number" value="35.315" class="w-full px-4 py-3 border border-gray-200 rounded-2xl focus:outline-none focus:border-emerald-500 text-lg"></div>
   </div>
  </div>
 </div>
</div>
<script>
document.getElementById('inches').addEventListener('input',function(){document.getElementById('cm').value=(parseFloat(this.value)||0)*2.54});
document.getElementById('cm').addEventListener('input',function(){document.getElementById('inches').value=(parseFloat(this.value)||0)/2.54});
document.getElementById('lbs').addEventListener('input',function(){document.getElementById('kg').value=((parseFloat(this.value)||0)/2.205).toFixed(2)});
document.getElementById('kg').addEventListener('input',function(){document.getElementById('lbs').value=((parseFloat(this.value)||0)*2.205).toFixed(2)});
document.getElementById('cbm').addEventListener('input',function(){document.getElementById('cft').value=((parseFloat(this.value)||0)*35.315).toFixed(3)});
document.getElementById('cft').addEventListener('input',function(){document.getElementById('cbm').value=((parseFloat(this.value)||0)/35.315).toFixed(3)});
</script>
</body>
</html>
