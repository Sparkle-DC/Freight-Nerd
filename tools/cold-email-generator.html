<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <base href="/Freight-Nerd/">
 <meta name="description" content="Free Cold Email Generator for freight brokers - Generate professional broker introduction emails instantly. Built for logistics sales.">
 <title>Cold Email Generator | FreightNerd</title>
 <script src="https://cdn.tailwindcss.com"></script>
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
 <style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap'); body { font-family: 'Inter', system-ui, sans-serif; } .calculator-card { box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.15); }</style>
</head>
<body class="bg-gray-50">
<div class="max-w-6xl mx-auto px-4 py-8">
 <div class="flex items-center justify-between mb-8">
  <a href="/"><div class="text-3xl font-bold text-emerald-600">FreightNerd</div></a>
  <a href="/tools/" class="text-emerald-600 hover:text-emerald-700 font-medium flex items-center gap-2"><i class="fas fa-th-large"></i> All Tools</a>
 </div>
 <div class="grid lg:grid-cols-2 gap-8">
  <div class="calculator-card bg-white rounded-3xl p-8 border border-gray-100">
   <div class="flex items-center gap-3 mb-6"><i class="fas fa-envelope text-4xl text-emerald-600"></i><div><h1 class="text-3xl font-semibold text-gray-900">Cold Email Generator</h1><p class="text-gray-600">Broker introduction emails in seconds</p></div></div>
   <div class="space-y-6">
    <div><label class="block text-sm font-medium text-gray-600 mb-1">Your Name</label><input id="name" type="text" value="John" class="w-full px-4 py-3 border border-gray-200 rounded-2xl focus:outline-none focus:border-emerald-500 text-lg"></div>
    <div><label class="block text-sm font-medium text-gray-600 mb-1">Your Company</label><input id="company" type="text" value="FreightPros LLC" class="w-full px-4 py-3 border border-gray-200 rounded-2xl focus:outline-none focus:border-emerald-500 text-lg"></div>
    <div><label class="block text-sm font-medium text-gray-600 mb-1">Target's Title</label>
     <select id="title" class="w-full px-4 py-3 border border-gray-200 rounded-2xl focus:outline-none focus:border-emerald-500 text-lg">
      <option>Logistics Manager</option>
      <option>Supply Chain Director</option>
      <option>Shipping Manager</option>
      <option>VP of Operations</option>
     </select>
    </div>
    <div><label class="block text-sm font-medium text-gray-600 mb-1">Target Company</label><input id="target" type="text" value="XYZ Manufacturing" class="w-full px-4 py-3 border border-gray-200 rounded-2xl focus:outline-none focus:border-emerald-500 text-lg"></div>
    <button onclick="genEmail()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-5 rounded-3xl text-xl transition-all"><i class="fas fa-envelope"></i> Generate Email</button>
   </div>
  </div>
  <div id="emailOutput" class="calculator-card bg-white rounded-3xl p-8 border border-gray-100" style="display:none">
   <div class="flex items-center justify-between mb-4"><h2 class="text-xl font-semibold">Your Email</h2><button onclick="copyEmail()" class="text-emerald-600 hover:text-emerald-700 text-sm"><i class="fas fa-copy"></i> Copy</button></div>
   <pre id="emailContent" class="bg-gray-50 rounded-2xl p-6 text-sm whitespace-pre-wrap font-sans"></pre>
  </div>
 </div>
</div>
<script>
function genEmail(){
 const n=document.getElementById('name').value,c=document.getElementById('company').value,t=document.getElementById('title').value,tg=document.getElementById('target').value;
 const email=`Subject: Reliable LTL & FTL capacity for ${tg}

Hi there,

I'm ${n} from ${c}. We specialize in providing reliable LTL and FTL capacity across the US.

I'd love the opportunity to quote on some of ${tg}'s upcoming freight moves. We offer competitive rates, real-time tracking, and dedicated support.

Would you be open to a quick 5-min call next week to discuss?

Thanks,
${n}
${c}
FreightNerd.com`;
 document.getElementById('emailContent').textContent=email;
 document.getElementById('emailOutput').style.display='block';
}
function copyEmail(){navigator.clipboard.writeText(document.getElementById('emailContent').textContent).then(()=>alert('Copied!'))}
</script>
</body>
</html>
