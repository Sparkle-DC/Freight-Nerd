<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <base href="/Freight-Nerd/">
 <meta name="description" content="Cold email generator for freight outreach - generate compliant, simple broker intro emails.">
 <title>Cold Email Generator | FreightNerd</title>
 <script src="https://cdn.tailwindcss.com"></script>
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body class="bg-gray-50">
<div class="max-w-6xl mx-auto px-4 py-8">
 <div class="flex items-center justify-between mb-8">
  <a href="/Freight-Nerd/"><div class="text-3xl font-bold text-emerald-600">FreightNerd</div></a>
  <a href="/Freight-Nerd/" class="text-emerald-600 hover:text-emerald-700 font-medium flex items-center gap-2"><i class="fas fa-th-large"></i> All Tools</a>
 </div>
 <div class="grid lg:grid-cols-2 gap-8">
  <div class="bg-white rounded-3xl p-8 border border-gray-100">
   <h1 class="text-3xl font-semibold mb-4">Cold Email Generator</h1>
   <p class="text-sm text-gray-500 mb-6">Use responsibly. Only for legitimate B2B outreach.</p>
   <input id="name" placeholder="Your name" class="w-full mb-3 p-3 border rounded">
   <input id="company" placeholder="Your company" class="w-full mb-3 p-3 border rounded">
   <input id="target" placeholder="Target company" class="w-full mb-3 p-3 border rounded">
   <button onclick="genEmail()" class="w-full bg-emerald-600 text-white py-3 rounded">Generate</button>
  </div>
  <div id="out" class="bg-white rounded-3xl p-8 border hidden">
   <pre id="email"></pre>
  </div>
 </div>
</div>
<script>
function genEmail(){
 const n=name.value,c=company.value,t=target.value;
 const e=`Subject: Capacity support for ${t}

Hi,

I'm ${n} from ${c}. We support LTL/FTL moves with consistent capacity.

Would it make sense to quote a lane or two for ${t}?

If this isn't relevant, just reply 'no' and I won't follow up.

Thanks,
${n}
${c}`;
 email.textContent=e; out.style.display='block';
}
</script>
</body>
</html>
