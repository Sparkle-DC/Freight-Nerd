<body class="bg-gray-50">
<div class="max-w-6xl mx-auto px-4 py-8">
 <div class="flex items-center justify-between mb-8">
  <a href="../"><div class="text-3xl font-bold text-emerald-600">FreightNerd</div></a>
  <a href="../" class="text-emerald-600 hover:text-emerald-700 font-medium flex items-center gap-2"><i aria-hidden="true" class="fas fa-th-large"></i> All Tools</a>
 </div>
 <div class="calculator-card bg-white rounded-3xl p-8 border border-gray-100">
  <div class="flex items-center gap-3 mb-6"><i aria-hidden="true" class="fas fa-sticky-note text-4xl text-emerald-600"></i><div><h1 class="text-3xl font-semibold text-gray-900">Notepad</h1><p class="text-gray-600">Auto-saves in your browser</p></div></div>
  <textarea id="notepad" rows="15" class="w-full px-4 py-4 border border-gray-200 rounded-3xl focus:outline-none focus:border-emerald-500 text-lg" placeholder="Type your notes here... e.g. container numbers, tracking IDs, rates..."></textarea>
  <div class="flex gap-3 mt-4">
   <button onclick="clearNotes()" class="bg-red-50 text-red-600 hover:bg-red-100 font-medium py-3 px-6 rounded-2xl transition-all"><i aria-hidden="true" class="fas fa-trash"></i> Clear</button>
   <button onclick="copyNotes()" class="bg-gray-100 hover:bg-gray-200 font-medium py-3 px-6 rounded-2xl transition-all"><i aria-hidden="true" class="fas fa-copy"></i> Copy</button>
  </div>
 </div>
</div>
<script>
const ta=document.getElementById('notepad');
ta.value=localStorage.getItem('fn_notepad')||'';
ta.addEventListener('input',function(){localStorage.setItem('fn_notepad',this.value)});
function clearNotes(){if(!confirm('Clear all notes? This cannot be undone.'))return;ta.value='';localStorage.removeItem('fn_notepad')}
function copyNotes(){navigator.clipboard.writeText(ta.value).then(()=>alert('Copied!'))}
</script>
</body>
