<html lang="en">
<head>
  <meta charset="UTF-8">

 <script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"Packing List Generator","description":"Free Packing List Generator - Create professional multi-item export packing lists with PDF download. Essential for international shipping documentation.","url":"https://freightnerd.com/tools/packing-list-generator.html","applicationCategory":"BusinessApplication","operatingSystem":"All"}</script>

  <link rel="stylesheet" href="../assets/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg==" crossorigin="anonymous" referrerpolicy="no-referrer">
  <style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap'); body { font-family: 'Inter', system-ui, sans-serif; } .calculator-card { box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.15); } @media print{.no-print{display:none!important}body{background:white}.calculator-card{box-shadow:none}}</style>
</head>
<body class="bg-gray-50">
<div class="max-w-6xl mx-auto px-4 py-8">
  <div class="flex items-center justify-between mb-8 no-print">
    <a href="../"><div class="text-3xl font-bold text-emerald-600">FreightNerd</div></a>
    <a href="../" class="text-emerald-600 hover:text-emerald-700 font-medium flex items-center gap-2"><i aria-hidden="true" class="fas fa-th-large"></i> All Tools</a>
  </div>
  <div class="calculator-card bg-white rounded-3xl p-8 border border-gray-100">
    <div class="flex items-center gap-3 mb-6 no-print"><i aria-hidden="true" class="fas fa-file-export text-4xl text-emerald-600"></i><div><h1 class="text-3xl font-semibold text-gray-900">Packing List Generator</h1><p class="text-gray-600">Multi-item export packing list for international shipping</p></div></div>

    <!-- Shipment Details -->
    <div class="grid lg:grid-cols-2 gap-8 no-print">
      <div class="space-y-5">
        <h2 class="text-lg font-semibold text-gray-800 border-b pb-2">Shipment Details</h2>
        <div><label class="block text-sm font-medium text-gray-600 mb-1">Shipper / Exporter</label><input id="shipper" type="text" value="ABC Exports Ltd" class="w-full px-4 py-3 border border-gray-200 rounded-2xl focus:outline-none focus:border-emerald-500 text-lg"></div>
        <div><label class="block text-sm font-medium text-gray-600 mb-1">Consignee</label><input id="consignee" type="text" value="XYZ Imports Inc" class="w-full px-4 py-3 border border-gray-200 rounded-2xl focus:outline-none focus:border-emerald-500 text-lg"></div>
        <div class="grid grid-cols-2 gap-4">
          <div><label class="block text-sm font-medium text-gray-600 mb-1">Invoice #</label><input id="invoice" type="text" value="INV-001" class="w-full px-4 py-3 border border-gray-200 rounded-2xl focus:outline-none focus:border-emerald-500 text-lg"></div>
          <div><label class="block text-sm font-medium text-gray-600 mb-1">Date</label><input id="date" type="date" class="w-full px-4 py-3 border border-gray-200 rounded-2xl focus:outline-none focus:border-emerald-500 text-lg"></div>
        </div>
        <div><label class="block text-sm font-medium text-gray-600 mb-1">Port of Loading</label><input id="pol" type="text" placeholder="e.g. Shanghai" class="w-full px-4 py-3 border border-gray-200 rounded-2xl focus:outline-none focus:border-emerald-500 text-lg"></div>
        <div><label class="block text-sm font-medium text-gray-600 mb-1">Port of Discharge</label><input id="pod" type="text" placeholder="e.g. Los Angeles" class="w-full px-4 py-3 border border-gray-200 rounded-2xl focus:outline-none focus:border-emerald-500 text-lg"></div>
      </div>

      <!-- Items Panel -->
      <div class="space-y-4">
        <div class="flex items-center justify-between border-b pb-2">
          <h2 class="text-lg font-semibold text-gray-800">Line Items</h2>
          <button onclick="addItem()" class="flex items-center gap-2 bg-emerald-50 text-emerald-700 hover:bg-emerald-100 font-medium px-4 py-2 rounded-2xl text-sm transition"><i aria-hidden="true" class="fas fa-plus"></i> Add Item</button>
        </div>
        <div id="itemsContainer" class="space-y-3"></div>
      </div>
    </div>

    <!-- Generate Button -->
    <button onclick="generatePackingList()" class="w-full mt-8 bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-5 rounded-3xl text-xl transition-all no-print"><i aria-hidden="true" class="fas fa-file-alt"></i> Generate Packing List</button>

    <!-- Output -->
    <div id="packingListOutput" class="mt-8 hidden">
      <div class="flex items-center justify-between mb-4 no-print">
        <h2 class="text-xl font-semibold text-gray-900">Generated Packing List</h2>
        <button onclick="window.print()" class="flex items-center gap-2 bg-gray-100 hover:bg-emerald-50 font-medium px-4 py-2 rounded-2xl text-sm transition"><i aria-hidden="true" class="fas fa-print"></i> Print / PDF</button>
      </div>
      <pre id="packingListText" class="bg-gray-50 rounded-3xl p-6 text-sm font-mono whitespace-pre-wrap border overflow-x-auto"></pre>
    </div>
  </div>
</div>
<script>
window.onload = function() {
  document.getElementById('date').value = new Date().toISOString().split('T')[0];
  // Start with 3 default items
  addItem('Cotton T-Shirts', 500, 250, 2.5);
  addItem('Denim Jeans', 200, 180, 1.8);
  addItem();
};

let itemCount = 0;

function addItem(desc='', qty='', weight='', cbm='') {
  itemCount++;
  const id = itemCount;
  const div = document.createElement('div');
  div.id = 'item-' + id;
  div.className = 'bg-gray-50 rounded-2xl p-4 border border-gray-100';
  div.innerHTML = `
    <div class="flex items-center justify-between mb-3">
      <span class="text-sm font-semibold text-gray-700">Item ${id}</span>
      <button onclick="removeItem(${id})" class="text-red-400 hover:text-red-600 text-sm transition"><i aria-hidden="true" class="fas fa-times"></i></button>
    </div>
    <div class="space-y-2">
      <input type="text" placeholder="Description" value="${desc}" class="item-desc w-full px-3 py-2 border border-gray-200 rounded-xl focus:outline-none focus:border-emerald-500 text-sm">
      <div class="grid grid-cols-3 gap-2">
        <div><label class="text-xs text-gray-500">Qty</label><input type="number" value="${qty}" placeholder="0" class="item-qty w-full px-3 py-2 border border-gray-200 rounded-xl focus:outline-none focus:border-emerald-500 text-sm"></div>
        <div><label class="text-xs text-gray-500">Weight (kg)</label><input type="number" value="${weight}" placeholder="0" step="0.1" class="item-weight w-full px-3 py-2 border border-gray-200 rounded-xl focus:outline-none focus:border-emerald-500 text-sm"></div>
        <div><label class="text-xs text-gray-500">CBM</label><input type="number" value="${cbm}" placeholder="0.00" step="0.01" class="item-cbm w-full px-3 py-2 border border-gray-200 rounded-xl focus:outline-none focus:border-emerald-500 text-sm"></div>
      </div>
    </div>
  `;
  document.getElementById('itemsContainer').appendChild(div);
}

function removeItem(id) {
  const el = document.getElementById('item-' + id);
  if (el) el.remove();
}

function pad(str, len) { return String(str).padEnd(len).slice(0, len); }

function generatePackingList() {
  const s = document.getElementById('shipper').value || '—';
  const c = document.getElementById('consignee').value || '—';
  const inv = document.getElementById('invoice').value || '—';
  const d = document.getElementById('date').value || '—';
  const pol = document.getElementById('pol').value || '—';
  const pod = document.getElementById('pod').value || '—';

  const itemEls = document.getElementById('itemsContainer').children;
  const items = [];
  let totalQty = 0, totalWeight = 0, totalCBM = 0;

  for (const el of itemEls) {
    const desc = el.querySelector('.item-desc').value || '—';
    const qty = parseFloat(el.querySelector('.item-qty').value) || 0;
    const weight = parseFloat(el.querySelector('.item-weight').value) || 0;
    const cbm = parseFloat(el.querySelector('.item-cbm').value) || 0;
    items.push({ desc, qty, weight, cbm });
    totalQty += qty;
    totalWeight += weight;
    totalCBM += cbm;
  }

  if (!items.length) { alert('Add at least one item before generating.'); return; }

  let itemRows = '';
  items.forEach((item, i) => {
    itemRows += `${String(i + 1).padStart(2)}. ${pad(item.desc, 22)} ${String(item.qty).padStart(6)} ${item.weight.toFixed(1).padStart(8)} ${item.cbm.toFixed(3).padStart(7)}\n`;
  });

  const output =
`═══════════════════════════════════════════════════
                   PACKING LIST
═══════════════════════════════════════════════════

Shipper/Exporter : ${s}
Consignee        : ${c}
Invoice #        : ${inv}
Date             : ${d}
Port of Loading  : ${pol}
Port of Discharge: ${pod}

───────────────────────────────────────────────────
 #  Description            Qty    Wt(kg)     CBM
───────────────────────────────────────────────────
${itemRows}───────────────────────────────────────────────────
    TOTALS                 ${String(totalQty).padStart(6)} ${totalWeight.toFixed(1).padStart(8)} ${totalCBM.toFixed(3).padStart(7)}
───────────────────────────────────────────────────

FreightNerd.com — Free Logistics Tools
For planning purposes only. Verify all details before commercial use.
`;

  document.getElementById('packingListText').textContent = output;
  document.getElementById('packingListOutput').classList.remove('hidden');
  document.getElementById('packingListOutput').scrollIntoView({ behavior: 'smooth' });
}
</script>
</body>
</html>
