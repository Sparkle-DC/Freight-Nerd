<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <meta name="description" content="Contact FreightNerd - get in touch for tool suggestions or questions.">
 <title>Contact | FreightNerd</title>
 <base href="/Freight-Nerd/">
 <script src="https://cdn.tailwindcss.com"></script>
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
 <style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap'); body { font-family: 'Inter', system-ui, sans-serif; }</style>
</head>
<body class="bg-gray-50">
 <header class="bg-white border-b sticky top-0 z-50">
 <div class="max-w-6xl mx-auto px-4 py-5 flex items-center justify-between">
 <a href="/" class="text-4xl font-bold text-emerald-600">FreightNerd</a>
 <nav class="flex items-center gap-8 text-sm font-medium">
 <a href="/" class="hover:text-emerald-600">Home</a>
 <a href="/tools/" class="hover:text-emerald-600">Tools</a>
 <a href="/about.html" class="hover:text-emerald-600">About</a>
 </nav>
 </div>
 </header>
 <section class="max-w-3xl mx-auto px-4 py-16">
 <h1 class="text-4xl font-semibold mb-6">Contact</h1>
 <p class="text-gray-600 text-lg mb-8">Have a tool idea, found a bug, or just want to say hi? Drop us a message.</p>
 <form class="space-y-6">
 <div><label class="block text-sm font-medium text-gray-600 mb-1">Name</label><input type="text" class="w-full px-4 py-3 border border-gray-200 rounded-2xl focus:outline-none focus:border-emerald-500 text-lg"></div>
 <div><label class="block text-sm font-medium text-gray-600 mb-1">Email</label><input type="email" class="w-full px-4 py-3 border border-gray-200 rounded-2xl focus:outline-none focus:border-emerald-500 text-lg"></div>
 <div><label class="block text-sm font-medium text-gray-600 mb-1">Message</label><textarea rows="5" class="w-full px-4 py-3 border border-gray-200 rounded-2xl focus:outline-none focus:border-emerald-500 text-lg"></textarea></div>
 <button type="submit" class="bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-4 px-8 rounded-3xl text-lg transition-all">Send Message</button>
 </form>
 </section>
 <footer class="bg-gray-900 text-white py-12"><div class="max-w-6xl mx-auto px-4 text-center"><div class="text-emerald-400 text-3xl font-bold mb-6">FreightNerd</div><p class="text-gray-400 mb-8">Free logistics tools for smarter shipping</p><p class="text-sm text-gray-500">&copy; 2026 FreightNerd. All Rights Reserved.</p></div></footer>
</body>
</html>
